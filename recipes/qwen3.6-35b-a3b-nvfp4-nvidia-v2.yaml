# Recipe: nvidia/Qwen3.6-35B-A3B-NVFP4 with native MTP
# Adapted from technigmaai/dgx-spark spark-vllm-docker/nvidia-Qwen3.6-35B-A3B-NVFP4/
# qwen3.6-35b-a3b-nvfp4-nvidia-v2.yaml. Upstream double-braced JSON args ({{...}})
# and templated {num_speculative_tokens} inside JSON; sparkrun does not collapse
# double braces and does not substitute vars inside JSON literals. Both fixed here.

recipe_version: '1'

name: qwen3.6-35b-a3b-nvfp4-nvidia-v2
model: nvidia/Qwen3.6-35B-A3B-NVFP4

description: nvidia/Qwen3.6-35B-A3B-NVFP4 with native MTP speculation, FP8 KV cache, FlashInfer attention, long-context Spark profile

container: sparkrun-eugr-vllm-tf5

solo_only: false
cluster_only: false

mods:
  - "@mcampa/fix-qwen3.6-chat-template"

defaults:
  host: 0.0.0.0
  port: 8000
  max_model_len: 262144
  max_num_batched_tokens: 32768
  max_num_seqs: 2
  gpu_memory_utilization: 0.7
  served_model_name: gx10 qwen3.6-35b-a3b
  chat_template: /workspace/vllm/chat_template.jinja
  tokenizer_mode: auto

env:
  TRANSFORMERS_OFFLINE: '1'
  HF_HUB_OFFLINE: '1'
  FLASHINFER_DISABLE_VERSION_CHECK: '1'
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: '1'
  VLLM_HTTP_TIMEOUT_KEEP_ALIVE: '600'
  VLLM_MARLIN_USE_ATOMIC_ADD: '1'
  VLLM_USE_FLASHINFER_MOE_FP4: '0'
  VLLM_FP8_MOE_BACKEND: flashinfer_cutlass
  TORCH_MATMUL_PRECISION: high
  NVIDIA_FORWARD_COMPAT: '1'
  NVIDIA_DISABLE_REQUIRE: '1'
  CUTE_DSL_ARCH: sm_121a

command: |
  vllm serve nvidia/Qwen3.6-35B-A3B-NVFP4 \
    --host {host} \
    --port {port} \
    --served-model-name {served_model_name} \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --max-num-seqs {max_num_seqs} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --dtype auto \
    --tokenizer-mode {tokenizer_mode} \
    --moe_backend auto \
    --load-format instanttensor \
    --attention-backend flashinfer \
    --enable-prefix-caching \
    --enable-chunked-prefill \
    --trust-remote-code \
    --chat-template {chat_template} \
    --quantization compressed-tensors \
    --kv-cache-dtype fp8 \
    --reasoning-parser qwen3 \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_coder \
    --optimization-level 3 \
    --performance-mode throughput \
    --default-chat-template-kwargs '{"preserve_thinking":true}' \
    --speculative-config '{"method":"mtp","num_speculative_tokens":3}' \
    --override-generation-config '{"temperature":0.6,"top_p":0.95,"top_k":20,"min_p":0.0,"presence_penalty":1.1,"repetition_penalty":1.01}'
