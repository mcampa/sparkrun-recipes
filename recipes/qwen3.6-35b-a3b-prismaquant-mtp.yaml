# Recipe: Qwen3.6-35B-A3B-PrismaQuant-4.75bit with native MTP
# Copied from @spark-arena/sub1777329489841 with the JSON brace bug fixed.
# Source double-braced the JSON args ({{...}}); sparkrun does not collapse
# those, so they leaked to vllm literally and broke arg parsing. JSON args
# use single braces here, matching the working qwen3.6-27b-fp8-mtp recipe.

recipe_version: '1'

name: qwen3.6-35b-a3b-prismaquant-mtp
model: rdtand/Qwen3.6-35B-A3B-PrismaQuant-4.75bit-vllm

description: rdtand/Qwen3.6-35B-A3B-PrismaQuant-4.75bit-vllm with native MTP speculation, FP8 KV cache, FlashInfer attention, long-context Spark profile

container: vllm-node-tf5

solo_only: true
cluster_only: false

mods:
  - "@mcampa/fix-qwen3.6-enhanced-chat-template"

defaults:
  host: 0.0.0.0
  port: 8000
  max_model_len: 262144
  max_num_batched_tokens: 32768
  max_num_seqs: 4
  gpu_memory_utilization: 0.6

env:
  FLASHINFER_DISABLE_VERSION_CHECK: '1'
  HF_HUB_OFFLINE: '1'
  TRANSFORMERS_OFFLINE: '1'
  VLLM_HTTP_TIMEOUT_KEEP_ALIVE: '600'
  VLLM_MARLIN_USE_ATOMIC_ADD: '1'
  VLLM_TUNED_CONFIG_FOLDER: /workspace/moe-configs

command: |
  vllm serve rdtand/Qwen3.6-35B-A3B-PrismaQuant-4.75bit-vllm \
    --host {host} \
    --port {port} \
    --served-model-name qwen3.6-35b \
    --chat-template qwen3.6-enhanced.jinja \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --max-num-seqs {max_num_seqs} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --dtype auto \
    --load-format instanttensor \
    --attention-backend flashinfer \
    --enable-prefix-caching \
    --enable-chunked-prefill \
    --trust-remote-code \
    --quantization compressed-tensors \
    --kv-cache-dtype fp8 \
    --reasoning-parser qwen3 \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_coder \
    --optimization-level 3 \
    --performance-mode throughput \
    --default-chat-template-kwargs '{"preserve_thinking":true}' \
    --speculative-config '{"method":"mtp","num_speculative_tokens":3}' \
    --override-generation-config '{"temperature":0.6,"top_p":0.95,"top_k":20,"min_p":0.0,"presence_penalty":1.1,"repetition_penalty":1.01}'
