# Recipe: AEON-7/Qwen3.6-27B-AEON-Ultimate-Uncensored-Multimodal-NVFP4-MTP-XS
# Spark-optimized per upstream model card: DFlash drafter (not MTP) gives
# 38 tok/s vs 24 tok/s on DGX Spark. NVFP4 body (~22 GB runtime VRAM),
# vision tower preserved in BF16, --quantization modelopt is required.

recipe_version: '1'

name: qwen3.6-27b-aeon-ultimate-nvfp4-dflash
model: AEON-7/Qwen3.6-27B-AEON-Ultimate-Uncensored-Multimodal-NVFP4-MTP-XS

description: AEON Ultimate Uncensored Multimodal NVFP4-XS with z-lab/Qwen3.6-27B-DFlash drafter, k=15, FlashAttention, Spark-tuned

container: vllm-node-tf5

solo_only: true
cluster_only: false

defaults:
  host: 0.0.0.0
  port: 8000
  max_model_len: 200000
  max_num_batched_tokens: 32768
  max_num_seqs: 16
  gpu_memory_utilization: 0.85
  served_model_name: aeon-qwen3.6-27b

env:
  FLASHINFER_DISABLE_VERSION_CHECK: '1'
  VLLM_HTTP_TIMEOUT_KEEP_ALIVE: '600'
  TORCH_MATMUL_PRECISION: high
  NVIDIA_FORWARD_COMPAT: '1'
  VLLM_MARLIN_USE_ATOMIC_ADD: '1'

command: |
  vllm serve AEON-7/Qwen3.6-27B-AEON-Ultimate-Uncensored-Multimodal-NVFP4-MTP-XS \
    --host {host} \
    --port {port} \
    --served-model-name {served_model_name} \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --max-num-seqs {max_num_seqs} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --quantization modelopt \
    --trust-remote-code \
    --attention-backend flash_attn \
    --enable-chunked-prefill \
    --enable-prefix-caching \
    --reasoning-parser qwen3 \
    --tool-call-parser qwen3_coder \
    --enable-auto-tool-choice \
    --speculative-config '{"method":"dflash","model":"z-lab/Qwen3.6-27B-DFlash","num_speculative_tokens":15}'
