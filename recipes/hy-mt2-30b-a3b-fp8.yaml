# Recipe: tencent/Hy-MT2-30B-A3B-FP8
# Tencent's multilingual translation model (33 languages). 30B total, ~3B active
# (128 experts, 8/token), HYV3ForCausalLM custom architecture. Native FP8 weights
# with static activation scaling and static FP8 KV cache (per model config.json).
# Translation-only — no reasoning parser, no tool-call parser, no MTP drafter.

recipe_version: '1'

name: hy-mt2-30b-a3b-fp8
model: tencent/Hy-MT2-30B-A3B-FP8

description: tencent/Hy-MT2-30B-A3B-FP8 multilingual translation model — native FP8 weights, FP8 KV cache, 262k context, Spark-tuned

container: sparkrun-eugr-vllm-tf5

solo_only: false
cluster_only: false

defaults:
  host: 0.0.0.0
  port: 8000
  max_model_len: 262144
  max_num_batched_tokens: 32768
  max_num_seqs: 4
  gpu_memory_utilization: 0.85
  served_model_name: hy-mt2-30b

env:
  TRANSFORMERS_OFFLINE: '1'
  HF_HUB_OFFLINE: '1'
  FLASHINFER_DISABLE_VERSION_CHECK: '1'
  VLLM_HTTP_TIMEOUT_KEEP_ALIVE: '600'
  VLLM_MARLIN_USE_ATOMIC_ADD: '1'
  TORCH_MATMUL_PRECISION: high
  NVIDIA_FORWARD_COMPAT: '1'

command: |
  vllm serve tencent/Hy-MT2-30B-A3B-FP8 \
    --host {host} \
    --port {port} \
    --served-model-name {served_model_name} \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --max-num-seqs {max_num_seqs} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --dtype auto \
    --quantization fp8 \
    --kv-cache-dtype fp8 \
    --load-format instanttensor \
    --attention-backend flashinfer \
    --enable-prefix-caching \
    --enable-chunked-prefill \
    --trust-remote-code \
    --enable-auto-tool-choice \
    --tool-call-parser hermes \
    --optimization-level 3 \
    --performance-mode throughput \
    --override-generation-config '{"temperature":0.7,"top_p":1.0,"top_k":-1,"repetition_penalty":1.0}'
