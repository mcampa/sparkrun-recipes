# Recipe: Qwen3.6-35B-A3B-PrismaQuant-4.75bit with DFlash speculation
# Tuned for long-context throughput with FlashAttention and full-context
# defaults. JSON-valued CLI args use escaped braces (`{{...}}`)
# so templated placeholders (for example `{num_speculative_tokens}`) are
# preserved correctly for runtime interpolation.

recipe_version: '1'

name: qwen3.6-35b-a3b-prismaquant-dflash
model: rdtand/Qwen3.6-35B-A3B-PrismaQuant-4.75bit-vllm

description: rdtand/Qwen3.6-35B-A3B-PrismaQuant-4.75bit-vllm with z-lab/Qwen3.6-35B-A3B-DFlash, k=6, FlashAttention, full-context

container: vllm-node-tf5

solo_only: false
cluster_only: false

mods:
  - mods/fix-qwen3.5-autoround
  - mods/fix-qwen3-coder-next

defaults:
  host: 0.0.0.0
  port: 8000
  max_model_len: 262144
  max_num_batched_tokens: 32768
  max_num_seqs: 4
  gpu_memory_utilization: 0.8
env:
  FLASHINFER_DISABLE_VERSION_CHECK: '1'
  HF_HUB_OFFLINE: '1'
  TRANSFORMERS_OFFLINE: '1'
  VLLM_HTTP_TIMEOUT_KEEP_ALIVE: '600'
  VLLM_MARLIN_USE_ATOMIC_ADD: '1'
  VLLM_TUNED_CONFIG_FOLDER: /workspace/moe-configs
  TORCH_MATMUL_PRECISION: high
  NVIDIA_FORWARD_COMPAT: '1'
  VLLM_TEST_FORCE_FP8_MARLIN: '1'
command: |
  vllm serve rdtand/Qwen3.6-35B-A3B-PrismaQuant-4.75bit-vllm \
    --host {host} \
    --port {port} \
    --served-model-name qwen3.6-35b \
    --language-model-only \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --max-num-seqs {max_num_seqs} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --dtype auto \
    --load-format fastsafetensors \
    --attention-backend flash_attn \
    --enable-prefix-caching \
    --enable-chunked-prefill \
    --trust-remote-code \
    --quantization compressed-tensors \
    --kv-cache-dtype auto \
    --reasoning-parser qwen3 \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_coder \
    --optimization-level 3 \
    --performance-mode throughput \
    --default-chat-template-kwargs '{{"preserve_thinking":true}}' \
    --speculative-config '{{"method":"dflash","model":"z-lab/Qwen3.6-35B-A3B-DFlash","num_speculative_tokens":{num_speculative_tokens}}}' \
    --override-generation-config '{{"temperature":0.6,"top_p":0.95,"top_k":20,"min_p":0.0,"presence_penalty":0.0,"repetition_penalty":1.0}}'
