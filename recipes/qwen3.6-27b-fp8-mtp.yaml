# Recipe: Qwen3.6-27B-FP8 (MTP)
# Qwen3.6-27B FP8 with Multi-Token Prediction speculative decoding

recipe_version: "1"
name: Qwen3.6-27B-FP8-MTP
model: Qwen/Qwen3.6-27B-FP8
runtime: vllm
container: vllm-node

metadata:
  description: Qwen3.6-27B-FP8 with MTP speculative decoding (num_speculative_tokens=3)
  model_params: 27B
  model_dtype: fp8

defaults:
  port: 8000
  host: 0.0.0.0

  tensor_parallel: 1
  gpu_memory_utilization: 0.75

  max_model_len: 32768
  max_num_batched_tokens: 16384
  max_num_seqs: 4

  served_model_name: Qwen3.6-27B-FP8-MTP

env:
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"

command: |
  vllm serve {model} \
    --host {host} \
    --port {port} \
    --tensor-parallel-size {tensor_parallel} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --max-num-seqs {max_num_seqs} \
    --enable-prefix-caching \
    --enable-chunked-prefill \
    --attention-backend flashinfer \
    --dtype auto \
    --kv-cache-dtype fp8 \
    --trust-remote-code \
    --enable-auto-tool-choice \
    --served-model-name {served_model_name} \
    --tool-call-parser qwen3_coder \
    --reasoning-parser qwen3 \
    --speculative-config '{"method":"mtp","num_speculative_tokens":3}' \
    --override-generation-config '{"temperature":0.6,"top_p":0.95,"top_k":20}' \
    --default-chat-template-kwargs '{"preserve_thinking":true}'
