# Recipe: Qwen3.6-27B-FP8-MTP
# Optimized for single DGX Spark / GB10
# Focus: best interactive coding throughput with native MTP

recipe_version: "1"

name: qwen3.6-27b-fp8-mtp
runtime: vllm
model: Qwen/Qwen3.6-27B-FP8

metadata:
  description: Optimized vLLM recipe for Qwen3.6-27B-FP8 with native MTP on DGX Spark
  model_params: 27B
  model_dtype: fp8
  kv_dtype: fp8

container: vllm-node-tf5
build_args:
  - --tf5

defaults:
  port: 8000
  host: 0.0.0.0

  tensor_parallel: 1
  gpu_memory_utilization: 0.70

  max_model_len: 262144
  max_num_batched_tokens: 32768
  max_num_seqs: 4

env:
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
  VLLM_USE_V1: "1"
  VLLM_MARLIN_USE_ATOMIC_ADD: "1"
  NCCL_CUMEM_ENABLE: "0"

command: |
  vllm serve {model} \
    --host {host} \
    --port {port} \
    -O3 \
    --tensor-parallel-size {tensor_parallel} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --max-num-seqs {max_num_seqs} \
    --kv-cache-dtype fp8 \
    --enable-prefix-caching \
    --enable-chunked-prefill \
    --load-format instanttensor \
    --attention-backend FLASHINFER \
    --trust-remote-code \
    --reasoning-parser qwen3 \
    --tool-call-parser qwen3_coder \
    --enable-auto-tool-choice \
    --generation-config auto \
    --speculative-config '{"method":"qwen3_next_mtp","num_speculative_tokens":3}' \
    --override-generation-config '{"temperature":0.6,"top_p":0.95,"top_k":20,"min_p":0.0,"presence_penalty":0.0,"repetition_penalty":1.0}' \
    --default-chat-template-kwargs '{"preserve_thinking": true}'
