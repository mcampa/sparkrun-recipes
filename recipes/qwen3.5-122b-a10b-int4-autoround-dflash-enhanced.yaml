name: Qwen3.5-122B-A10B-int4-Autoround-EC-DFLASH-FLashQLA-SlidingWindowAttention
runtime: vllm
model: shieldstar/Qwen3.5-122B-A10B-int4-AutoRound-EC
recipe_version: '1'
solo_only: true
command: |
  vllm serve shieldstar/Qwen3.5-122B-A10B-int4-AutoRound-EC \
    --served-model-name {served_model_name} \
    --host {host} \
    --port {port} \
    --max-model-len {max_model_len} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --max-num-seqs {max_num_seqs} \
    --dtype bfloat16 \
    --load-format fastsafetensors \
    --trust-remote-code \
    --attention-backend flash_attn \
    --speculative-config '{speculative_config}' \
    --enable-prefix-caching \
    --enable-chunked-prefill \
    --enable-prompt-tokens-details \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_coder \
    --chat-template qwen3.5-enhanced.jinja \
    --reasoning-parser qwen3 \
    --generation-config auto \
    --override-generation-config '{generation_config}'
defaults:
  max_num_batched_tokens: 16384
  host: 0.0.0.0
  generation_config: '{"temperature":1.0,"top_p":0.95,"top_k":20,"min_p":0.0,"presence_penalty":1.5,"repetition_penalty":1.0}'
  served_model_name: qwen
  max_num_seqs: 8
  max_model_len: 196608
  gpu_memory_utilization: 0.82
  speculative_config: '{"method":"dflash","model":"z-lab/Qwen3.5-122B-A10B-DFlash","num_speculative_tokens":5}'
  port: 8000
env:
  VLLM_ENABLE_CUDAGRAPH_GC: '1'
  FLASHINFER_DISABLE_VERSION_CHECK: '1'
  VLLM_USE_FLASHINFER_SAMPLER: '1'
  VLLM_MARLIN_USE_ATOMIC_ADD: '1'
  TZ: Europe/Vienna
build_args:
  - '--tf5'
metadata:
  quant_bits: 4
  num_kv_heads: 2
  head_dim: 256
  num_layers: 48
  description: Qwen3.5-122B AutoRound EC + z-lab DFlash, 196K ctx, 16K prefill, Qwen general-thinking sampler
  quantization: auto-round
  model_dtype: int4
builder: eugr
max_nodes: 1
mods:
  - "@mcampa/fix-qwen3.5-enhanced-chat-template"
container: vllm-node-tf5
